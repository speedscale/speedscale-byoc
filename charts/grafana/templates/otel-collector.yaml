apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Release.Namespace }}
data:
  otel.yaml: |
    receivers:
      otlp:
        protocols:
          # The Speedscale forwarder's byoc_otel exporter uses OTLP gRPC
          # (lib/exporter/otel_logs.go: otlploggrpc.New). It MUST connect
          # to a gRPC endpoint on 4317; pointing it at HTTP 4318 silently
          # fails forever with no logs reaching Loki.
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      # Scrape Prometheus-format /metrics endpoints from in-cluster services.
      # Targets are listed statically here; switch to k8s_sd_configs for
      # auto-discovery as the metric surface grows.
      prometheus:
        config:
          scrape_configs:
            - job_name: agent-factory-intake-api
              scrape_interval: 30s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - agent-factory-intake-api.agent-factory.svc.cluster.local:8080
                  labels:
                    service: agent-factory
                    component: intake-api
            # Speedscale forwarder exposes Prometheus metrics on port 4145
            # (DefaultMetricsPort, lib/schema/pb/constant.go). The default
            # speedscale-forwarder Service only exposes 8888 (gRPC), so this
            # job targets the dedicated metrics Service deployed alongside
            # the OTEL collector — see speedscale-forwarder-metrics.yaml.
            - job_name: speedscale-forwarder
              scrape_interval: 30s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - speedscale-forwarder-metrics.speedscale.svc.cluster.local:4145
                  labels:
                    service: speedscale
                    component: forwarder
            # speedscale-nettap pod's ingest container is goproxy, which
            # exposes Prometheus on 4145 (DefaultMetricsPort). The capture
            # container — standalone github.com/speedscale/nettap — does NOT
            # expose /metrics, only /config /stats /readyz /healthz. We scrape
            # the ingest side via speedscale-nettap-metrics.yaml.
            - job_name: speedscale-nettap
              scrape_interval: 30s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - speedscale-nettap-metrics.speedscale.svc.cluster.local:4145
                  labels:
                    service: speedscale
                    component: nettap-ingest

    processors:
      batch: {}
      # The OTEL Loki exporter only promotes a log record's attributes to Loki
      # stream labels when a hint attribute `loki.attribute.labels` lists them
      # (and `loki.resource.labels` for resource-level attrs). Without this,
      # the exporter silently produces zero streams. The Speedscale forwarder
      # sets attributes `service` and `namespace` on each RRPair log record
      # (lib/exporter/otel_logs.go:rrpairToLogRecord), and the resource has
      # `cluster`. Promote them so we can filter in Grafana.
      attributes/loki-hints:
        actions:
          - key: loki.attribute.labels
            value: service,namespace
            action: insert
      resource/loki-hints:
        attributes:
          - key: loki.resource.labels
            value: cluster
            action: insert

      # --- Metrics derivation processors ---
      # Promotes RRPair body fields to log attributes so the count and sum
      # connectors can group by them. Each log body is a map with fields:
      # service (string), status (string e.g. "200"/"504"), l7protocol
      # ("http"/"postgres"/"mysql"/"grpc"), duration (number, ms).
      transform/rrpair-attrs:
        log_statements:
          - context: log
            statements:
              - set(attributes["svc"],         body["service"])
              - set(attributes["status"],      body["status"])
              - set(attributes["l7"],          body["l7protocol"])
              - set(attributes["duration_ms"], Double(body["duration"]))

      # Only derive metrics for HTTP traffic - keeps cardinality bounded
      # and avoids protocol-specific status semantics (SQL error codes, etc.).
      # Non-HTTP rrpairs continue through the logs pipeline to Loki unchanged.
      filter/http-only:
        error_mode: ignore
        logs:
          log_record:
            - 'attributes["l7"] != "http"'

      # Convert delta-temporality connector output to cumulative so
      # prometheusremotewrite can emit them as proper Prometheus counters.
      # The count and sum connectors emit Delta by default; remote-write
      # requires Cumulative for monotonic sums.
      deltatocumulative/traffic: {}

    connectors:
      # countconnector: counts log records grouped by svc + status.
      # Emits speedscale_calls (monotonic sum) per (svc, status) pair.
      # Error rate in PromQL: rate(speedscale_calls{status=~"5.."}[5m])
      #                       / rate(speedscale_calls[5m])
      count:
        logs:
          speedscale_calls:
            description: "Total HTTP calls observed by Speedscale forwarder, by service and HTTP status"
            attributes:
              - key: svc
              - key: status

      # sumconnector: sums duration_ms per svc.
      # Avg latency in PromQL:
      #   rate(speedscale_request_duration_ms_sum[5m])
      #   / rate(speedscale_calls{svc=~".+"}[5m])
      # NOTE: true percentiles (p50/p95/p99) are NOT derivable from log-based
      # sums. They require explicit histogram instrumentation (spanmetrics
      # connector or native OTLP spans). Follow-up task.
      sum:
        logs:
          speedscale_request_duration_ms_sum:
            description: "Sum of HTTP request duration (ms) by service; divide by speedscale_calls for avg latency"
            source_attribute: duration_ms
            attributes:
              - key: svc

    exporters:
      loki:
        endpoint: http://loki.{{ .Release.Namespace }}.svc.cluster.local:3100/loki/api/v1/push
        default_labels_enabled:
          exporter: true
          job: true
      # Push scraped Prometheus metrics into the in-cluster Prometheus via
      # its remote-write receiver (prometheus.yaml enables
      # --web.enable-remote-write-receiver).
      prometheusremotewrite:
        endpoint: http://prometheus.{{ .Release.Namespace }}.svc.cluster.local:9090/api/v1/write
        tls:
          insecure: true
      debug:
        verbosity: basic

    extensions:
      # health_check extension exposes /health on :13133 - used by k8s
      # readiness/liveness probes below. Argo CD treats a Deployment as
      # Healthy only when all its pods have Ready=true, which in turn
      # waits for this probe.
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        # Original logs pipeline: all rrpairs -> Loki. UNCHANGED.
        logs:
          receivers: [otlp]
          processors: [resource/loki-hints, attributes/loki-hints, batch]
          exporters: [loki, debug]

        # Metrics derivation branch: same otlp receiver fans out to this
        # pipeline in parallel (OTel fan-out is safe - each pipeline gets
        # its own copy of each log record). Promotes body fields, filters
        # to HTTP, then feeds count + sum connectors.
        logs/metrics:
          receivers: [otlp]
          processors: [transform/rrpair-attrs, filter/http-only, batch]
          exporters: [count, sum]

        # Metrics storage: connectors (count, sum) act as both exporter
        # (for logs/metrics above) and receiver (for this pipeline).
        # Remote-write to in-cluster Prometheus.
        metrics:
          receivers: [prometheus, count, sum]
          processors: [deltatocumulative/traffic, batch]
          exporters: [prometheusremotewrite, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.image.otelCollector }}
          args:
            - "--config=/conf/otel.yaml"
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 13133
              name: health
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /conf
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
