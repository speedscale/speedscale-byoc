apiVersion: v2
name: fluentbit-gcs
description: |
  Speedscale BYOC reference architecture — OTel Collector → Fluent Bit → Google Cloud Storage.
  Fluent Bit acts as the gateway / buffer / shipper, batching RRPair logs into NDJSON objects
  written to a GCS bucket via the GCS XML (S3-compatible) API. Pairs with the Speedscale
  Operator chart (installed separately into the `speedscale` namespace); this chart installs
  only the in-cluster pipeline that receives RRPairs from the Forwarder's byoc_otel exporter
  and ships them to long-term object storage.
type: application
version: 1.0.1
appVersion: "1.0.1"
keywords:
  - speedscale
  - byoc
  - gcs
  - google-cloud-storage
  - opentelemetry
  - fluentbit
  - archive
  - data-lake
home: https://github.com/speedscale/speedscale-byoc
maintainers:
  - name: Speedscale
    email: support@speedscale.com
    url: https://speedscale.com
annotations:
  artifacthub.io/category: infrastructure
  artifacthub.io/license: Apache-2.0
sources:
  - https://github.com/speedscale/speedscale-byoc/tree/main/charts/fluentbit-gcs
