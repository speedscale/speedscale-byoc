apiVersion: v2
name: fluentbit-gcs
description: |
  Speedscale BYOC reference architecture — OTel Collector → Google Cloud Storage.
  The collector's native awss3 exporter writes OTLP-JSON objects directly to a GCS
  bucket via the GCS S3-compatible XML API (HMAC credentials). No Fluent Bit required.
  Pairs with the Speedscale Operator chart (installed separately into the `speedscale`
  namespace); this chart installs only the in-cluster pipeline that receives RRPairs
  from the Forwarder's byoc_otel exporter and ships them to long-term object storage.
type: application
version: 2.0.0
appVersion: "2.0.0"
keywords:
  - speedscale
  - byoc
  - gcs
  - google-cloud-storage
  - opentelemetry
  - awss3
  - archive
  - data-lake
home: https://github.com/speedscale/speedscale-byoc
maintainers:
  - name: Speedscale
    email: support@speedscale.com
    url: https://speedscale.com
annotations:
  artifacthub.io/category: infrastructure
  artifacthub.io/license: Apache-2.0
sources:
  - https://github.com/speedscale/speedscale-byoc/tree/main/charts/fluentbit-gcs
