# Example Argo CD Application manifest for the BYOC OTel Collector → GCS
# reference architecture.
#
# Prerequisite: the K8s Secret `byoc-fluentbit-gcs` (HMAC creds) must
# already exist in the destination namespace. Create it out-of-band, NOT
# from Argo, so credentials never live in git or Argo's manifest cache:
#   kubectl create namespace byoc-fluentbit
#   kubectl -n byoc-fluentbit create secret generic byoc-fluentbit-gcs \
#     --from-literal=accessKeyId=GOOG1... \
#     --from-literal=secretAccessKey=...
#
# Apply this Application with:
#   kubectl apply -f argocd-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: byoc-fluentbit
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/speedscale/speedscale-byoc.git
    targetRevision: main
    path: charts/fluentbit-gcs
    helm:
      # Required overrides — your bucket + region. Everything else has
      # sensible defaults in values.yaml.
      values: |
        gcs:
          bucket: my-rrpair-archive
          region: us-central1

  destination:
    server: https://kubernetes.default.svc
    namespace: byoc-fluentbit

  syncPolicy:
    automated:
      prune: true       # delete resources removed from git
      selfHeal: true    # revert drift back to git
    syncOptions:
      # Argo creates the namespace, but you must still create the
      # byoc-fluentbit-gcs Secret out-of-band before sync succeeds.
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m
        factor: 2
