# BYOC OTel Collector → GCS chart values.
#
# This chart installs ONLY the in-cluster shipping pipeline (OTel Collector
# with a native awss3 exporter). RRPair logs land as OTLP-JSON objects in a
# GCS bucket via the GCS S3-compatible XML API — no Fluent Bit required.
#
# Pipeline: Forwarder --OTLP gRPC--> OTel Collector --awss3--> GCS
#
# The Speedscale Operator + Forwarder are installed separately via the
# upstream `speedscale/speedscale-operator` chart, configured to ship RRPairs
# to this chart's OTel Collector via:
#   byoc_otel.otel_endpoint: http://otel-collector.<namespace>.svc.cluster.local:4317

# GCS target. The OTel Collector's awss3 exporter writes via GCS's S3-compatible
# XML API (Interoperability), which requires HMAC credentials tied to a service
# account that has Storage Object Admin on the bucket.
#
# Provision before installing:
#   gcloud storage buckets create gs://<bucket> --location=<region> --uniform-bucket-level-access
#   gcloud iam service-accounts create byoc-collector-gcs
#   gcloud storage buckets add-iam-policy-binding gs://<bucket> \
#     --member=serviceAccount:byoc-collector-gcs@<project>.iam.gserviceaccount.com \
#     --role=roles/storage.objectAdmin
#   gcloud storage hmac create byoc-collector-gcs@<project>.iam.gserviceaccount.com
#
# Then create the Secret out-of-band (chart references but does NOT manage it):
#   kubectl -n <release-namespace> create secret generic byoc-fluentbit-gcs \
#     --from-literal=accessKeyId=GOOG1...    \
#     --from-literal=secretAccessKey=...
gcs:
  bucket: speedscale-rrpair-demo
  region: us-central1
  # GCS XML/Interop endpoint. Override if using a locational endpoint.
  # See: https://cloud.google.com/storage/docs/request-endpoints
  endpoint: https://storage.googleapis.com
  # Name of the K8s Secret holding HMAC creds. Keys: accessKeyId, secretAccessKey.
  credentialsSecret: byoc-fluentbit-gcs

# Image pin. Must be opentelemetry-collector-contrib (awss3 is a contrib exporter).
image:
  otelCollector: otel/opentelemetry-collector-contrib:0.108.0
