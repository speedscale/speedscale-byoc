apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Release.Namespace }}
data:
  otel.yaml: |
    receivers:
      otlp:
        # Both gRPC (4317) and HTTP (4318) — forwarder's byoc_gcs exporter
        # uses gRPC; HTTP left in for curl-based testing.
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      # Write RRPair objects directly to GCS via the S3-compatible XML API.
      # The awss3 exporter reads AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY from
      # the environment; GCS HMAC credentials satisfy those fields transparently.
      awss3:
        s3uploader:
          region: {{ .Values.gcs.region }}
          s3_bucket: {{ .Values.gcs.bucket }}
          s3_prefix: byoc
          endpoint: {{ .Values.gcs.endpoint }}
          s3_force_path_style: true
        marshaler: otlp_json
      debug:
        verbosity: basic

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [awss3, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.image.otelCollector }}
          args:
            - "--config=/conf/otel.yaml"
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 13133
              name: health
          env:
            # The awss3 exporter uses the standard AWS credential chain.
            # GCS HMAC keys satisfy the same interface when paired with
            # endpoint=storage.googleapis.com.
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gcs.credentialsSecret }}
                  key: accessKeyId
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gcs.credentialsSecret }}
                  key: secretAccessKey
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /conf
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
