apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Release.Namespace }}
data:
  otel.yaml: |
    receivers:
      otlp:
        # Both gRPC (4317) and HTTP (4318) — forwarder's byoc_azure exporter
        # uses gRPC; HTTP left in for curl-based testing.
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      # Write RRPair blobs directly to Azure Blob Storage via the collector's
      # native azureblob exporter. connection_string overrides url, but both
      # are set; format json = OTLP-JSON blobs. The ${env:...} refs are kept
      # literal so the collector expands them at runtime from the pod env.
      azureblob:
        url: ${env:AZURE_BLOB_URL}
        auth:
          type: connection_string
          connection_string: ${env:AZURE_CONNECTION_STRING}
        container:
          logs: {{ .Values.azure.container | quote }}
        format: json
      debug:
        verbosity: basic

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [azureblob, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.image.otelCollector }}
          args:
            - "--config=/conf/otel.yaml"
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 13133
              name: health
          env:
            # Plain storage-account blob URL. connection_string overrides it,
            # but the azureblob exporter still expects the field populated.
            - name: AZURE_BLOB_URL
              value: {{ .Values.azure.url | quote }}
            # Connection string holds account name + key; the exporter uses it
            # for both endpoint resolution and authentication.
            - name: AZURE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.azure.connectionStringSecret }}
                  key: connectionString
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /conf
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
