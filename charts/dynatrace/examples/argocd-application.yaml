# Example Argo CD Application manifest for the BYOC OTel Collector → Dynatrace
# reference architecture.
#
# Prerequisite: the K8s Secret `byoc-dynatrace` (Dynatrace API token, key
# apiToken) must already exist in the destination namespace. Create it
# out-of-band, NOT from Argo, so the token never lives in git or Argo's
# manifest cache:
#   kubectl create namespace byoc-dynatrace
#   kubectl -n byoc-dynatrace create secret generic byoc-dynatrace \
#     --from-literal=apiToken=dt0c01...
#
# Apply this Application with:
#   kubectl apply -f argocd-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: byoc-dynatrace
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/speedscale/speedscale-byoc.git
    targetRevision: main
    path: charts/dynatrace
    helm:
      # Required override — your environment's OTLP base URL. The token lives
      # in the byoc-dynatrace Secret (see prerequisite above), not here.
      values: |
        dynatrace:
          endpoint: https://<env-id>.live.dynatrace.com/api/v2/otlp
          tokenSecret: byoc-dynatrace

  destination:
    server: https://kubernetes.default.svc
    namespace: byoc-dynatrace

  syncPolicy:
    automated:
      prune: true       # delete resources removed from git
      selfHeal: true    # revert drift back to git
    syncOptions:
      # Argo creates the namespace, but you must still create the
      # byoc-dynatrace Secret out-of-band before sync succeeds.
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m
        factor: 2
