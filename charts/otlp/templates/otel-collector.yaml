apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Release.Namespace }}
data:
  otel.yaml: |
    receivers:
      otlp:
        # Both gRPC (4317) and HTTP (4318) — the forwarder's byoc_<vendor>
        # exporter uses gRPC; HTTP left in for curl-based testing.
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      # Forward RRPair logs to the OTLP-native backend over OTLP/HTTP.
      # logs_endpoint is the EXACT logs URL so each vendor's path layout works.
      # ${env:OTLP_ENDPOINT} / ${env:OTLP_TOKEN} stay LITERAL here — the
      # collector expands them at runtime from the Deployment env (the token
      # comes from a Secret). Only the header name/prefix + compression are
      # rendered by Helm.
      otlphttp:
        logs_endpoint: ${env:OTLP_ENDPOINT}
        headers:
          {{ .Values.otlp.headerName }}: "{{ .Values.otlp.headerPrefix }}${env:OTLP_TOKEN}"
        compression: {{ .Values.otlp.compression }}
      debug:
        verbosity: basic

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.image.otelCollector }}
          args:
            - "--config=/conf/otel.yaml"
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 13133
              name: health
          env:
            # Expanded into the ConfigMap's ${env:...} refs at collector startup.
            - name: OTLP_ENDPOINT
              value: {{ .Values.otlp.endpoint | quote }}
            - name: OTLP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.otlp.tokenSecret }}
                  key: token
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /conf
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
