{{/*
  Fluent Bit has been removed from this chart.

  Root cause: Fluent Bit 4.0.3's OTLP input rejects JSON-encoded OTLP/HTTP
  with HTTP 400 — it only accepts protobuf. The prior workaround of forwarding
  msgpack through the s3 output hit a separate serialization bug: Fluent Bit's
  s3 plugin cannot serialize OTLP `bytes_value` attributes from OTLP logs,
  producing corrupted objects.

  Replacement: the OTel Collector's native `awss3` exporter (contrib since
  v0.40) writes OTLP-JSON objects directly to S3, using the standard AWS
  credential chain (static creds or IRSA on EKS). This matches the same
  direct-write pattern used by the Loki and Elasticsearch exporters in the
  grafana chart and eliminates the Fluent Bit hop entirely.

  IRSA ServiceAccount (EKS only): rendered below when irsa.enabled=true.
  See: otel-collector.yaml — awss3 exporter configuration.
*/}}
{{- if and .Values.irsa.enabled .Values.irsa.roleArn }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.irsa.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.irsa.roleArn }}
{{- end }}
