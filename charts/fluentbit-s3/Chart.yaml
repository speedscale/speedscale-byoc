apiVersion: v2
name: fluentbit-s3
description: |
  Speedscale BYOC reference architecture — OTel Collector → Amazon S3.
  The chart name/path are legacy compatibility names from the prior Fluent Bit implementation.
  The collector's native awss3 exporter writes OTLP-JSON objects directly to S3.
  Supports both static IAM credentials (Secret) and EKS IRSA (no credentials in cluster).
  No Fluent Bit required. Pairs with the Speedscale Operator chart (installed separately
  into the `speedscale` namespace).
type: application
version: 2.0.0
appVersion: "2.0.0"
keywords:
  - speedscale
  - byoc
  - s3
  - aws
  - opentelemetry
  - awss3
  - archive
  - data-lake
home: https://github.com/speedscale/speedscale-byoc
maintainers:
  - name: Speedscale
    email: support@speedscale.com
    url: https://speedscale.com
annotations:
  artifacthub.io/category: infrastructure
  artifacthub.io/license: Apache-2.0
sources:
