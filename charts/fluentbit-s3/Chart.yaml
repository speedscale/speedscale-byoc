apiVersion: v2
name: fluentbit-s3
description: |
  Speedscale BYOC reference architecture — OTel Collector → Fluent Bit → Amazon S3.
  Supports both static IAM credentials (Secret) and EKS IRSA (no credentials in cluster).
  Hive-partitioned gzipped NDJSON objects compatible with Athena/Glue external tables.
  Pairs with the Speedscale Operator chart (installed separately into the `speedscale` namespace).
type: application
version: 1.0.1
appVersion: "1.0.1"
keywords:
  - speedscale
  - byoc
  - s3
  - aws
  - opentelemetry
  - fluentbit
  - archive
  - data-lake
home: https://github.com/speedscale/speedscale-byoc
maintainers:
  - name: Speedscale
    email: support@speedscale.com
    url: https://speedscale.com
annotations:
  artifacthub.io/category: infrastructure
  artifacthub.io/license: Apache-2.0
sources:
