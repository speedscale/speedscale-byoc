s3:
  # S3 bucket name (required)
  bucket: my-rrpair-archive
  # AWS region where the bucket lives
  region: us-east-1
  # Base prefix used for archived OTLP JSON objects.
  prefix: byoc
  # Custom S3 endpoint for non-AWS providers (e.g. DigitalOcean Spaces, MinIO).
  # Leave empty for AWS S3.
  endpoint: ""
  # Force path-style URLs (bucket in path, not subdomain). Required for most
  # S3-compatible providers (DO Spaces, MinIO, etc.). Ignored when endpoint is empty.
  forcePathStyle: false
  # Kubernetes Secret with accessKeyId + secretAccessKey. Set to "" for IRSA.
  credentialsSecret: byoc-s3

irsa:
  # Enable IRSA (EKS only) — creates an annotated ServiceAccount and omits
  # static credential env vars from the collector pod.
  enabled: false
  # IAM role ARN for IRSA. Required when irsa.enabled=true.
  roleArn: ""
  # Name of the ServiceAccount created when IRSA is enabled
  serviceAccountName: byoc-s3

# Image pin. Must be opentelemetry-collector-contrib (awss3 is a contrib exporter).
image:
  otelCollector: otel/opentelemetry-collector-contrib:0.108.0
  awsCli: amazon/aws-cli:2.17.52

layout:
  # When enabled, the chart writes known workloads to deterministic
  # namespace/app/time prefixes and publishes _speedscale/byoc-layout.json.
  enabled: false
  partition: minute
  workloads: []
  # - namespace: banking-app
  #   appLabel: banking-gateway
