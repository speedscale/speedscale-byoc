# Example Argo CD Application manifest for the BYOC OTel Collector → S3
# reference architecture.
#
# Legacy note: the chart path is still charts/fluentbit-s3, but it deploys
# OTel Collector awss3 and no Fluent Bit pod.
#
# Option A (static credentials): the K8s Secret `byoc-s3` must
# already exist in the destination namespace BEFORE Argo syncs. Create it
# out-of-band so credentials never live in git:
#   kubectl create namespace byoc-s3
#   kubectl -n byoc-s3 create secret generic byoc-s3 \
#     --from-literal=accessKeyId=AKIA... \
#     --from-literal=secretAccessKey=...
#
# Option B (IRSA — EKS only): set irsa.enabled=true and irsa.roleArn below.
# No Secret is needed; the collector pod picks up the role via a projected token.
#
# Apply this Application with:
#   kubectl apply -f argocd-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: byoc-s3
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/speedscale/speedscale-byoc.git
    targetRevision: main
    path: charts/fluentbit-s3
    helm:
      # Required overrides — your bucket and region.
      values: |
        s3:
          bucket: my-rrpair-archive
          region: us-east-1
          prefix: byoc
          credentialsSecret: byoc-s3

        # Optional: write known workloads under namespace/app/time prefixes and
        # publish _speedscale/byoc-layout.json for proxymock import auto-detect.
        # layout:
        #   enabled: true
        #   workloads:
        #     - namespace: banking-app
        #       appLabel: banking-gateway

        # Option B: uncomment to use IRSA instead of static credentials.
        # irsa:
        #   enabled: true
        #   roleArn: arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>
        #   serviceAccountName: byoc-s3

  destination:
    server: https://kubernetes.default.svc
    namespace: byoc-s3

  syncPolicy:
    automated:
      prune: true       # delete resources removed from git
      selfHeal: true    # revert drift back to git
    syncOptions:
      # Argo creates the namespace, but for Option A you must still create
      # the byoc-s3 Secret out-of-band before sync succeeds.
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m
        factor: 2
