    description: 'Speedscale BYOC reference architecture — OTel Collector → Google
      Cloud Storage. The collector''s native awss3 exporter writes OTLP-JSON objects
      directly to a GCS bucket via the GCS S3-compatible XML API (HMAC credentials).
      No Fluent Bit required. Pairs with the Speedscale Operator chart (installed
      separately into the `speedscale` namespace); this chart installs only the in-cluster
      pipeline that receives RRPairs from the Forwarder''s byoc_otel exporter and
      ships them to long-term object storage. '
