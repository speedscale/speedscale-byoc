    description: 'Speedscale BYOC → OTel Collector → Azure Blob Storage. The collector''s
      azureblob exporter writes OTLP-JSON blobs to your container; no in-cluster storage.
      Pairs with the Speedscale Operator chart (installed separately into the `speedscale`
